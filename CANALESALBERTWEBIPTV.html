<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestor IPTV - Grilla Organizada</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f2f2f2; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { padding: 10px; margin: 5px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 15px; cursor: pointer; border: none; background: #007bff; color: white; border-radius: 5px; }
        button:hover { background: #0056b3; }
        .delete { background: #dc3545; }
        .delete:hover { background: #a71d2a; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #eee; }
        .bloque-header { background: #343a40; color: white; font-weight: bold; text-align: center; }
        .reserva { color: #999; font-style: italic; background: #f9f9f9; }
        a { color: #007bff; text-decoration: none; font-size: 0.9em; }
        .search { width: 98%; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Gestor de Grilla IPTV</h2>
    
    <div style="background: #e9ecef; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
        <input id="nombre" placeholder="Nombre del canal">
        <input id="id" placeholder="ID (ej: a07z)">
        <input id="dial" type="number" placeholder="Dial #">
        <button onclick="agregar()">Agregar a la lista</button>
    </div>

    <input class="search" id="buscar" placeholder="Buscar por nombre, ID o dial..." onkeyup="buscarCanal()">

    <table>
        <thead>
            <tr>
                <th>Dial</th>
                <th>Nombre</th>
                <th>ID</th>
                <th>Link M3U8</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="lista">
            </tbody>
    </table>
</div>

<script>

    { dial: 19, nombre: "COMEDY MAX", id: "a09i", cat: "VARIEDADES" },
    { dial: 20, nombre: "LOL CHANNEL TV", id: "a0br", cat: "VARIEDADES" },

    // BLOQUE: CINE (26-40)
    { dial: 26, nombre: "CREO MOVIES", id: "a083", cat: "CINE Y SERIES" },

    { dial: 32, nombre: "TLNOVELAS", id: "TLNOVELAS", cat: "CINE Y SERIES" },
    { dial: 33, nombre: "NOVEMAX", id: "NOVEMAX", cat: "CINE Y SERIES" },
    { dial: 34, nombre: "CINE AMOR", id: "CINEAMOR", cat: "CINE Y SERIES" },

    { dial: 51, nombre: "CREO SPORTS", id: "a087", cat: "DEPORTES" },

    { dial: 54, nombre: "ESPN 6", id: "a0b2", cat: "DEPORTES" },
    { dial: 55, nombre: "NBA TV", id: "NBATV", cat: "DEPORTES" },
    { dial: 56, nombre: "ADRENALINA SPORTS", id: "ADRENALINASPORTN", cat: "DEPORTES" },
    { dial: 57, nombre: "1 BASEBALL NET.", id: "a06a", cat: "DEPORTES" },
    { dial: 58, nombre: "GOLF CHANNEL", id: "a00x", cat: "DEPORTES" },

    { dial: 78, nombre: "PEQUE TV", id: "a0bs", cat: "INFANTILES" },

    // BLOQUE: ADULTOS (131-135)
    { dial: 131, nombre: "CREO HOT", id: "a09d", cat: "ADULTOS (18+)" },
    { dial: 132, nombre: "LUNA ROSA", id: "a0bi", cat: "ADULTOS (18+)" },
    { dial: 133, nombre: "ADULTOS 5", id: "a082", cat: "ADULTOS (18+)" },
    { dial: 134, nombre: "ZONA X TV", id: "a0bq", cat: "ADULTOS (18+)" },
    { dial: 135, nombre: "MAVERICK", id: "a0b7", cat: "ADULTOS (18+)" }
];

function cargar() {
    // Si no hay datos en localStorage, cargamos los iniciales organizados
    let datos = JSON.parse(localStorage.getItem("iptvLista"));
    
    if (!datos || datos.length === 0) {
        datos = canalesIniciales;
        localStorage.setItem("iptvLista", JSON.stringify(datos));
    }

    document.getElementById("lista").innerHTML = "";

    // Ordenar por Dial antes de mostrar
    datos.sort((a, b) => a.dial - b.dial);

    let ultimaCat = "";

    datos.forEach((item, index) => {
        // Insertar encabezado de bloque si cambia la categoría
        if (item.cat && item.cat !== ultimaCat) {
            let header = `<tr><td colspan="5" class="bloque-header">${item.cat}</td></tr>`;
            document.getElementById("lista").innerHTML += header;
            ultimaCat = item.cat;
        }
        mostrar(item, index);
    });
}

function mostrar(item, index) {
    let tabla = document.getElementById("lista");
    let link = base + item.id.trim() + "/index.m3u8";

    let fila = `
        <tr>
            <td><strong>${item.dial}</strong></td>
            <td>${item.nombre}</td>
            <td><code>${item.id}</code></td>
            <td><a href="${link}" target="_blank">${link}</a></td>
            <td><button class="delete" onclick="eliminar(${index})">Eliminar</button></td>
        </tr>
    `;
    tabla.innerHTML += fila;
}

function agregar() {
    let nombre = document.getElementById("nombre").value;
    let id = document.getElementById("id").value;
    let dial = parseInt(document.getElementById("dial").value);

    if (nombre == "" || id == "" || isNaN(dial)) {
        alert("Completa todos los campos (Nombre, ID y Dial)");
        return;
    }

    let datos = JSON.parse(localStorage.getItem("iptvLista")) || [];
    datos.push({ nombre, id, dial, cat: "PERSONALIZADOS" });
    
    localStorage.setItem("iptvLista", JSON.stringify(datos));

    document.getElementById("nombre").value = "";
    document.getElementById("id").value = "";
    document.getElementById("dial").value = "";

    cargar();
}

function eliminar(index) {
    if(!confirm("¿Seguro que quieres eliminar este canal?")) return;
    let datos = JSON.parse(localStorage.getItem("iptvLista")) || [];
    datos.splice(index, 1);
    localStorage.setItem("iptvLista", JSON.stringify(datos));
    cargar();
}

function buscarCanal() {
    let input = document.getElementById("buscar").value.toLowerCase();
    let filas = document.querySelectorAll("#lista tr:not(.bloque-header)");

    filas.forEach(fila => {
        let texto = fila.innerText.toLowerCase();
        fila.style.display = texto.includes(input) ? "" : "none";
    });
}

// Ejecutar carga inicial
cargar();

</script>

</body>
</html>
